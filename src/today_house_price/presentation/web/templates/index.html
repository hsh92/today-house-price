{% extends "base.html" %}
{% block title %}집값 예측 입력{% endblock %}
{% block content %}
<section class="card">
  <h2>매물 정보 입력</h2>
  <p class="hint">자치구·건물용도·면적·층·계약일을 입력하면 예측 거래금액(만원)을 보여줍니다.</p>
  <form method="post" action="{{ url_for('web.predict') }}" class="form-grid">
    <label>
      자치구
      <select name="cgg_nm" required>
        <option value="">선택</option>
        {% for district in districts %}
          <option value="{{ district }}" {% if form and form.CGG_NM == district %}selected{% endif %}>{{ district }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      건물용도
      <select name="bldg_usg" required>
        <option value="">선택</option>
        {% for usage in usages %}
          <option value="{{ usage }}" {% if form and form.BLDG_USG == usage %}selected{% endif %}>{{ usage }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      건물면적 (㎡)
      <input type="number" step="0.01" name="arch_area" required value="{{ form.ARCH_AREA if form else '' }}">
    </label>
    <label>
      건축년도
      <input type="number" name="arch_yr" required value="{{ form.ARCH_YR if form else '' }}">
    </label>
    <label>
      층
      <input type="number" step="0.1" name="flr" required value="{{ form.FLR if form else '' }}">
    </label>
    <label>
      계약일 (YYYYMMDD)
      <input type="text" name="ctrt_day" pattern="\d{8}" placeholder="{{ today }}" value="{{ form.CTRT_DAY if form else today }}">
    </label>
    <div class="form-actions">
      <button type="submit">예측하기</button>
    </div>
  </form>
</section>
{% endblock %}
